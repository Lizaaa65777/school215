<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Школа 215 · Вход в систему</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        }
        body {
            background: linear-gradient(135deg, #0a2647 0%, #1e3a5f 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .login-container {
            max-width: 450px;
            width: 100%;
            background: white;
            border-radius: 30px;
            box-shadow: 0 30px 60px rgba(0,0,0,0.3);
            overflow: hidden;
        }
        .header {
            background: linear-gradient(135deg, #0a2647 0%, #1e3a5f 100%);
            color: white;
            padding: 30px;
            text-align: center;
        }
        .header h1 {
            font-size: 1.8rem;
            margin-bottom: 10px;
        }
        .header p {
            opacity: 0.8;
            font-size: 0.9rem;
        }
        .logo {
            font-size: 3rem;
            margin-bottom: 15px;
        }
        .tabs {
            display: flex;
            border-bottom: 2px solid #e0ecf9;
        }
        .tab {
            flex: 1;
            text-align: center;
            padding: 15px;
            cursor: pointer;
            font-weight: 600;
            color: #5f7d9e;
            transition: 0.2s;
        }
        .tab.active {
            color: #1d4e85;
            border-bottom: 2px solid #1d4e85;
            margin-bottom: -2px;
        }
        .form-container {
            padding: 30px;
        }
        .form {
            display: none;
        }
        .form.active {
            display: block;
        }
        .form-group {
            margin-bottom: 20px;
        }
        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: #0a2647;
        }
        .form-group input, .form-group select {
            width: 100%;
            padding: 12px 15px;
            border: 2px solid #e0ecf9;
            border-radius: 12px;
            font-size: 1rem;
            transition: 0.2s;
        }
        .form-group input:focus, .form-group select:focus {
            outline: none;
            border-color: #1d4e85;
        }
        .btn {
            width: 100%;
            padding: 14px;
            background: #1d4e85;
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: 0.2s;
        }
        .btn:hover {
            background: #0f3a68;
        }
        .error-message {
            background: #fee9e6;
            color: #c62828;
            padding: 12px;
            border-radius: 10px;
            margin-bottom: 20px;
            font-size: 0.9rem;
            display: none;
        }
        .info-message {
            background: #e8f0fe;
            color: #1d4e85;
            padding: 12px;
            border-radius: 10px;
            margin-bottom: 20px;
            font-size: 0.9rem;
        }
        .test-accounts {
            margin-top: 20px;
            padding: 15px;
            background: #f5faff;
            border-radius: 12px;
            font-size: 0.8rem;
        }
        .test-accounts h4 {
            margin-bottom: 10px;
            color: #0a2647;
        }
        .test-account {
            padding: 5px 0;
            font-family: monospace;
            color: #1d4e85;
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="header">
            <div class="logo">🏫</div>
            <h1>Школа 215</h1>
            <p>Электронный дневник</p>
        </div>
        
        <div class="tabs">
            <div class="tab active" onclick="switchTab('login')">Вход</div>
            <div class="tab" onclick="switchTab('register')">Регистрация</div>
        </div>
        
        <div class="form-container">
            <!-- Форма входа -->
            <div id="login-form" class="form active">
                <div id="login-error" class="error-message"></div>
                <div class="form-group">
                    <label>Имя пользователя</label>
                    <input type="text" id="login-username" placeholder="Введите имя пользователя">
                </div>
                <div class="form-group">
                    <label>Пароль</label>
                    <input type="password" id="login-password" placeholder="Введите пароль">
                </div>
                <button class="btn" onclick="login()">Войти</button>
            </div>
            
            <!-- Форма регистрации -->
            <div id="register-form" class="form">
                <div id="register-error" class="error-message"></div>
                <div class="form-group">
                    <label>Полное имя</label>
                    <input type="text" id="reg-fullname" placeholder="Иванов Иван Иванович">
                </div>
                <div class="form-group">
                    <label>Имя пользователя</label>
                    <input type="text" id="reg-username" placeholder="ivanov_i">
                </div>
                <div class="form-group">
                    <label>Пароль</label>
                    <input type="password" id="reg-password" placeholder="Минимум 6 символов">
                </div>
                <div class="form-group">
                    <label>Роль</label>
                    <select id="reg-role">
                        <option value="student">Ученик</option>
                        <option value="teacher">Учитель</option>
                        <option value="parent">Родитель</option>
                    </select>
                </div>
                <div class="form-group" id="class-group" style="display: none;">
                    <label>Класс</label>
                    <input type="text" id="reg-class" placeholder="Например: 9А">
                </div>
                <button class="btn" onclick="register()">Зарегистрироваться</button>
            </div>
            
            <div class="test-accounts">
                <h4>📋 Тестовые аккаунты</h4>
                <div class="test-account">👑 Админ: admin / admin123</div>
                <div class="test-account">👨‍🏫 Учитель: ivanova / teacher123</div>
                <div class="test-account">👨‍🎓 Ученик: ivanov_i / student123</div>
                <div class="test-account">👪 Родитель: ivanova_e / parent123</div>
            </div>
        </div>
    </div>

    <script>
        const API_URL = window.location.origin;
        
        function switchTab(tab) {
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.form').forEach(f => f.classList.remove('active'));
            
            if (tab === 'login') {
                document.querySelector('.tab:first-child').classList.add('active');
                document.getElementById('login-form').classList.add('active');
            } else {
                document.querySelector('.tab:last-child').classList.add('active');
                document.getElementById('register-form').classList.add('active');
            }
        }
        
        // Показывать поле класса только для учеников
        document.getElementById('reg-role').addEventListener('change', function() {
            const classGroup = document.getElementById('class-group');
            if (this.value === 'student') {
                classGroup.style.display = 'block';
            } else {
                classGroup.style.display = 'none';
            }
        });
        
        async function login() {
            const username = document.getElementById('login-username').value;
            const password = document.getElementById('login-password').value;
            const errorDiv = document.getElementById('login-error');
            
            if (!username || !password) {
                errorDiv.textContent = 'Пожалуйста, заполните все поля';
                errorDiv.style.display = 'block';
                return;
            }
            
            try {
                console.log("Отправка запроса на вход:", { username, password });
                
                const response = await fetch(`${API_URL}/api/auth/login`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password }),
                    credentials: 'include'
                });
                
                const data = await response.json();
                console.log("Ответ сервера:", data);
                
                if (response.ok && data.success) {
                    // Сохраняем данные пользователя
                    localStorage.setItem('user', JSON.stringify(data.user));
                    
                    // Перенаправление в зависимости от роли
                    console.log("Роль пользователя:", data.user.role);
                    switch(data.user.role) {
                        case 'admin':
                            window.location.href = '/admin';
                            break;
                        case 'teacher':
                            window.location.href = '/teacher';
                            break;
                        case 'parent':
                            window.location.href = '/parent';
                            break;
                        default:
                            window.location.href = '/student';
                    }
                } else {
                    errorDiv.textContent = data.error || 'Ошибка входа';
                    errorDiv.style.display = 'block';
                    console.error("Ошибка входа:", data);
                }
            } catch (error) {
                console.error("Ошибка подключения:", error);
                errorDiv.textContent = 'Ошибка подключения к серверу';
                errorDiv.style.display = 'block';
            }
        }
        
        async function register() {
            const fullname = document.getElementById('reg-fullname').value;
            const username = document.getElementById('reg-username').value;
            const password = document.getElementById('reg-password').value;
            const role = document.getElementById('reg-role').value;
            const className = document.getElementById('reg-class').value;
            const errorDiv = document.getElementById('register-error');
            
            if (!fullname || !username || !password) {
                errorDiv.textContent = 'Пожалуйста, заполните все обязательные поля';
                errorDiv.style.display = 'block';
                return;
            }
            
            if (password.length < 6) {
                errorDiv.textContent = 'Пароль должен содержать минимум 6 символов';
                errorDiv.style.display = 'block';
                return;
            }
            
            // Создаем объект с правильными именами полей для бэкенда
            const requestData = {
                full_name: fullname,      // ⬅️ Исправлено: full_name вместо fullname
                username: username,
                password: password,
                role: role
            };
            
            // Добавляем класс только для учеников
            if (role === 'student' && className) {
                requestData.class_name = className;
            }
            
            console.log('Отправляем данные:', requestData); // Для отладки
            
            try {
                const response = await fetch(`${API_URL}/api/auth/register`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(requestData)
                });
                
                const data = await response.json();
                
                if (response.ok && data.success) {
                    alert('Регистрация успешна! Теперь вы можете войти.');
                    switchTab('login');
                    document.getElementById('login-username').value = username;
                    document.getElementById('login-password').value = '';
                } else {
                    errorDiv.textContent = data.error || 'Ошибка регистрации';
                    errorDiv.style.display = 'block';
                }
            } catch (error) {
                console.error('Ошибка:', error);
                errorDiv.textContent = 'Ошибка подключения к серверу';
                errorDiv.style.display = 'block';
            }
        }
    </script>
</body>
</html>
